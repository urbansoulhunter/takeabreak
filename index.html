<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon (public/karma-flyer.png) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/karma-flyer.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/karma-flyer.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/karma-flyer.png" />

    <!-- Primary Meta Tags (defaults for crawlers before JS; per-route overrides via react-helmet-async) -->
    <title>Take a Break - Beyond The Beat, Always.</title>
    <meta name="title" content="Take a Break - Beyond The Beat, Always." />
    <meta name="description" content="Eventi premium di drum & bass e UK garage in Sardegna. Esperienza musicale unica con i migliori artisti internazionali della scena bass music." />
    <meta name="keywords" content="drum and bass, UK garage, musica elettronica, La Caletta, Siniscola, Sardegna, Italia, bass music, eventi musicali, underground music" />
    <meta name="author" content="Take a Break" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="__SITE_URL__/" />

    <!-- Open Graph / Twitter (static fallbacks for link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:title" content="Take a Break - Beyond The Beat, Always." />
    <meta property="og:description" content="Eventi premium di drum & bass e UK garage in Sardegna. Esperienza musicale unica con i migliori artisti internazionali della scena bass music." />
    <meta property="og:image" content="__OG_IMAGE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Take a Break" />
    <meta property="og:locale" content="it_IT" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Take a Break - Beyond The Beat, Always." />
    <meta name="twitter:description" content="Eventi premium di drum & bass e UK garage in Sardegna. Esperienza musicale unica con i migliori artisti internazionali della scena bass music." />
    <meta name="twitter:image" content="__OG_IMAGE__" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://iili.io" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#00f0ff" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
